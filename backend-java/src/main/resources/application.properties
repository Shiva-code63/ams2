server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ams2?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Shiva@63}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jackson.serialization.write-dates-as-timestamps=false

ams2.jwt.secret=${AMS2_JWT_SECRET:change-this-secret}
ams2.jwt.ttl-seconds=${AMS2_JWT_TTL_SECONDS:604800}

ams2.face.service.base-url=${AMS2_FACE_SERVICE_BASE_URL:http://localhost:8000}
ams2.face.service.upload-dir=${AMS2_FACE_SERVICE_UPLOAD_DIR:../python-face-service/uploads/faces}

ams2.qr.ttl-seconds=${AMS2_QR_TTL_SECONDS:30}

ams2.cors.allowed-origins=${AMS2_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
